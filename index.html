    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Contact Book</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link

      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <div class="container">
      <div class="main d-flex justify-content-center align-items-center vh-100">
        <button
          id="addContactBtn"
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#addContact"
        >
          Add Contact
        </button>

        <div class="d-none" id="contactCard">
          <div class="input-group">
            <i class="bi bi-search input-group-text"></i>
            <input
              type="text"
              class="form-control"
              id="search"
              placeholder="Search.."
            />
          </div>
          <div
            class="d-flex align-items-center justify-content-center mt-3 gap-3"
          >
            <i class="bi bi-arrow-left-circle-fill arrow-btn" id="prev"></i>
            <div
              id="contactCarousel"
              class="carousel slide"
              data-bs-interval="false"
            >
              <div class="carousel-inner" id="carouselInner"></div>

                          <h5 class="mb-0" id="ContactName"></h5>

                      </div>

                      <p class="mb-1">

                    </div>
                  </div>
                </div>
              </div> -->
            </div>
            <i class="bi bi-arrow-right-circle-fill arrow-btn" id="next"></i>
          </div>

          <div class="text-center mt-3">
            <i
              class="bi bi-plus-circle-fill fs-2 plus-btn"
              data-bs-toggle="modal"
              data-bs-target="#addContact"
            ></i>
          </div>
        </div>
      </div>

      <!-- Modal -->
      <div id="addContact" class="modal fade">
        <div class="modal-dialog modal-dialog-scrollable">
          <div class="modal-content">
            <div class="modal-header">
              <h4 class="modal-title mx-auto">Add Contact Detail</h4>
            </div>
            <div class="modal-body">
              <div class="field mb-2">
                <label for="imgUrl" class="form-label">Profile image URL</label>
                <div class="input-group">
                  <label for="imgUrl" class="input-group-text"
                    ><i class="bi bi-image"></i>
                  </label>
                  <input type="text" class="form-control" id="imgUrl" />
                </div>
                <small id="imgError" class="text-danger"></small>
              </div>

              <div class="field mb-2">
                <label for="contactName" class="form-label">Name</label>
                <div class="input-group">
                  <label for="contactName" class="input-group-text"
                    ><i class="bi bi-person-circle"></i>
                  </label>
                  <input type="text" class="form-control" id="contactName" />
                </div>
                <small id="nameError" class="text-danger"></small>
              </div>

              <div class="field mb-2">
                <label for="phn_no" class="form-label">Phone Number</label>
                <div class="input-group">
                  <label for="phn_no" class="input-group-text">🇮🇳 +91</label>
                  <input type="text" class="form-control" id="phn_no" />
                </div>
                <small id="numberError" class="text-danger"></small>
              </div>

              <div class="field mb-2">
                <label for="address" class="form-label">Address</label>
                <div class="input-group">
                  <label for="address" class="input-group-text"
                    ><i class="bi bi-geo-alt"></i>
                  </label>
                  <input type="text" class="form-control" id="address" />
                </div>
                <small id="addressError" class="text-danger"></small>
              </div>

              <div class="field mb-2">
                <label for="profession" class="form-label">Profession</label>
                <div class="input-group">
                  <label for="profession" class="input-group-text"
                    ><i class="bi bi-mortarboard"></i>
                  </label>
                  <input type="text" class="form-control" id="profession" />
                </div>
                <small id="professionError" class="text-danger"></small>
              </div>

              <div
                class="mt-2 d-flex gap-3 justify-content-end align-items-center"
              >
                <button
                  type="button"
                  class="btn btn-danger"
                  data-bs-dismiss="modal"
                  onclick="handleReset()"
                >
                  Cancel
                </button>
                <button
                  class="btn btn-success"
                  type="button"
                  onclick="saveContact()"
                >
                  Add
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
